<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4FC3DE">
<title>Coordinació · 2n de primària</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#4FC3DE;      /* lletra clara */
  --cyan-soft:#7FD6E9;
  --teal:#14657F;      /* lletra fosca */
  --teal-ink:#0C4658;  /* text principal */
  --sun:#F4CE5E;       /* esclat groc */
  --sun-deep:#E9B93A;
  --paper:#F5FBFD;
  --panel:#FFFFFF;
  --panel-2:#EAF6FA;
  --line:#D5EAF1;
  --muted:#5E8494;

  --mireia:#EE9B4C;
  --cristina:#D5638E;
  --pol:#5A6FE0;

  --pendent:#E9B93A;
  --proces:#4F9BDE;
  --acabada:#4CB782;

  --r:18px; --r-lg:26px;
  --shadow:0 10px 30px -12px rgba(12,70,88,.28);
  --shadow-sm:0 4px 14px -8px rgba(12,70,88,.30);
  --font-d:"Fredoka",system-ui,sans-serif;
  --font:"Nunito",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--teal-ink);
  background:
    radial-gradient(1200px 620px at 80% -8%, #E6F7FB 0%, rgba(230,247,251,0) 60%),
    radial-gradient(1000px 560px at -10% 110%, #E9F6EF 0%, rgba(233,246,239,0) 55%),
    var(--paper);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer}
a{color:var(--teal)}
:focus-visible{outline:3px solid var(--pol);outline-offset:2px;border-radius:8px}
::selection{background:var(--sun);color:var(--teal-ink)}

/* ---------- reusable ---------- */
.eyebrow{font-family:var(--font);font-weight:800;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.chip{display:inline-flex;align-items:center;gap:.4em;font-weight:800;font-size:.74rem;padding:.28em .7em;border-radius:999px;line-height:1;white-space:nowrap}
.avatar{display:grid;place-items:center;border-radius:50%;color:#fff;font-family:var(--font-d);font-weight:600;flex:none;box-shadow:inset 0 -2px 6px rgba(0,0,0,.12)}
.btn{border:none;border-radius:14px;font-weight:800;padding:.7em 1.1em;display:inline-flex;align-items:center;gap:.5em;transition:transform .12s ease, box-shadow .2s ease, background .2s}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-primary{background:linear-gradient(180deg,var(--cyan),#38B4D2);color:#063341;box-shadow:0 8px 18px -8px rgba(20,101,127,.65)}
.btn-primary:hover{box-shadow:0 12px 22px -8px rgba(20,101,127,.7)}
.btn-ghost{background:var(--panel-2);color:var(--teal)}
.btn-ghost:hover{background:#dff1f6}
.icon{width:1.15em;height:1.15em;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.hidden{display:none!important}

/* burst dashes motif */
.burst span,.t-burst span{position:absolute;width:3px;border-radius:3px;background:var(--sun);transform-origin:center;opacity:.9}

/* ======================================================= LOGIN */
#login{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:26px;
  background:radial-gradient(900px 600px at 50% -10%,#EAF8FC,transparent 65%),var(--paper);
  transition:opacity .5s ease, visibility .5s}
#login.gone{opacity:0;visibility:hidden;pointer-events:none}
.login-card{width:min(520px,100%);text-align:center}
.login-card .mark{width:min(380px,86%);margin:0 auto 10px;display:block;filter:drop-shadow(0 16px 22px rgba(12,70,88,.18));animation:pop .7s cubic-bezier(.2,1.3,.4,1) both}
.login-card p{color:var(--muted);font-weight:800;font-size:1.05rem;margin:0 0 22px}
.who{display:grid;gap:12px}
.who-btn{display:flex;align-items:center;gap:14px;background:var(--panel);border:2px solid var(--line);
  border-radius:var(--r-lg);padding:12px 16px;text-align:left;transition:transform .14s, border-color .2s, box-shadow .2s;box-shadow:var(--shadow-sm)}
.who-btn:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.who-btn .avatar{width:52px;height:52px;font-size:1.2rem}
.who-btn b{font-family:var(--font-d);font-weight:600;font-size:1.15rem;display:block;color:var(--teal-ink)}
.who-btn small{color:var(--muted);font-weight:700}
.who-btn .go{margin-left:auto;color:var(--muted)}

/* ======================================================= APP SHELL */
#app{max-width:1120px;margin:0 auto;padding:22px 20px 140px}
#app.blur{filter:blur(3px);pointer-events:none;user-select:none}

/* topbar (home pill only — no menu) */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.home-pill{display:flex;align-items:center;gap:9px;background:var(--panel);border:1.5px solid var(--line);
  border-radius:999px;padding:6px 14px 6px 8px;box-shadow:var(--shadow-sm);font-weight:800;color:var(--teal)}
.home-pill img{width:30px;height:30px;object-fit:contain}
.home-pill .icon{width:16px;height:16px;stroke-width:3}
.search-pill{display:flex;align-items:center;gap:8px;background:var(--panel);border:1.5px solid var(--line);
  border-radius:999px;padding:8px 15px;box-shadow:var(--shadow-sm);font-weight:800;color:var(--teal)}
.search-pill .icon{width:18px;height:18px;stroke-width:2.7}
.search-pill:hover{border-color:var(--cyan)}
@media(max-width:520px){.search-pill .lbl{display:none}.search-pill{padding:8px 11px}}
.topbar .me{margin-left:auto;display:flex;align-items:center;gap:9px;background:var(--panel);border:1.5px solid var(--line);
  border-radius:999px;padding:5px 6px 5px 12px;box-shadow:var(--shadow-sm);font-weight:800;color:var(--teal-ink)}
.topbar .me .avatar{width:32px;height:32px;font-size:.85rem}
.topbar .me button{border:none;background:transparent;color:var(--muted);font-weight:800;font-size:.8rem}

/* ---------- HERO ---------- */
.hero{position:relative;text-align:center;padding:14px 0 6px;margin-bottom:4px}
.hero .rays{position:absolute;inset:0;pointer-events:none}
.hero-logo{width:min(430px,82%);margin:0 auto;display:block;position:relative;z-index:2;
  filter:drop-shadow(0 20px 26px rgba(12,70,88,.14));animation:pop .7s cubic-bezier(.2,1.3,.4,1) both}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.94)}to{opacity:1;transform:none}}
.greet{position:relative;z-index:2;font-family:var(--font-d);font-weight:500;color:var(--teal);margin:2px 0 0;font-size:1.05rem}
.greet b{font-weight:600}

/* ---------- AVALUACIÓ ---------- */
.av-tri-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.av-tri-card{--tc:var(--avaluacio);position:relative;display:flex;align-items:center;gap:14px;background:var(--panel);
  border:1.5px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm);cursor:pointer;
  transition:transform .15s,box-shadow .2s,border-color .2s;text-align:left}
.av-tri-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--tc)}
.av-tri-num{width:44px;height:44px;border-radius:14px;background:var(--tc);color:#fff;display:grid;place-items:center;
  font-family:var(--font-d);font-weight:600;font-size:1.4rem;flex:none}
.av-tri-name{font-family:var(--font-d);font-weight:600;font-size:1.12rem;color:var(--teal-ink);flex:1}
.av-tri-card .av-go{width:20px;height:20px;stroke:var(--muted);stroke-width:2.6}
.av-intro{color:var(--muted);font-weight:700;font-size:.9rem;margin:0 2px 14px}
.av-levels{display:grid;gap:12px}
.av-level{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:14px;box-shadow:var(--shadow-sm)}
.av-level-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.av-level-name{flex:none;width:165px;border:1.5px solid var(--line);border-radius:10px;padding:.45em .6em;font-family:inherit;
  font-weight:800;font-size:.86rem;color:var(--avaluacio);background:var(--paper);text-transform:none}
.av-level-name:focus{border-color:var(--cyan);background:#fff;outline:none}
.av-copy{margin-left:auto;display:inline-flex;align-items:center;gap:.35em;background:var(--panel-2);border:none;color:var(--teal);
  font-weight:800;font-size:.78rem;padding:.42em .7em;border-radius:10px}
.av-copy .icon{width:14px;height:14px;stroke-width:2.2}
.av-copy:hover{background:#d7eff5}
.av-rm{background:transparent;border:none;color:#c9dbe1;padding:5px;border-radius:8px;line-height:0}
.av-rm .icon{width:16px;height:16px}
.av-rm:hover{color:var(--cristina);background:var(--panel-2)}
.av-phrase{width:100%;min-height:70px;resize:vertical}
.av-add{margin-top:12px;width:100%;justify-content:center}

/* ---------- panells d'inici (pendents + setmana) ---------- */
.home-cols{display:flex;flex-wrap:wrap;gap:14px}
.hpanel{flex:1 1 300px;background:var(--panel);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-sm)}
.hpanel-head{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.hpanel-head h3{font-family:var(--font-d);font-weight:600;font-size:1.1rem;margin:0;color:var(--teal-ink)}
.hpanel-head .icon{width:18px;height:18px;stroke:var(--teal);stroke-width:2.2;flex:none}
.hpanel-count{margin-left:auto;background:var(--sun);color:#5a4406;font-weight:800;font-size:.74rem;padding:.12em .55em;border-radius:999px}
.hpanel-empty{color:var(--muted);font-weight:700;font-size:.88rem;padding:8px 0}
.hrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}
.hrow:hover .htitle{color:var(--teal)}
.hbox{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);background:#fff;flex:none;display:grid;place-items:center;cursor:pointer;padding:0}
.hbox:hover{border-color:var(--acabada)}
.hbox .icon{width:13px;height:13px;stroke:var(--acabada);stroke-width:3.5;opacity:0}
.hbox:hover .icon{opacity:.55}
.htitle{flex:1;font-weight:700;color:var(--teal-ink);font-size:.9rem;min-width:0;line-height:1.3}
.hstatus{font-weight:800;font-size:.68rem;padding:.16em .5em;border-radius:999px;color:#fff;flex:none}
.wk-day{text-align:center;min-width:46px;border-radius:11px;padding:5px 6px;font-family:var(--font-d);color:#fff;flex:none}
.wk-day .wd{font-size:.6rem;font-weight:700;text-transform:uppercase;opacity:.92;line-height:1.1}
.wk-day .dn{font-size:1.05rem;font-weight:600;line-height:1}
.wk-time{color:var(--muted);font-weight:800;font-size:.74rem;flex:none}
@media(max-width:760px){.home-cols{grid-template-columns:1fr}}
.block{margin-top:26px}
.block-head{display:flex;align-items:baseline;gap:12px;margin:0 2px 12px}
.block-head h2{font-family:var(--font-d);font-weight:600;font-size:1.35rem;margin:0;color:var(--teal-ink)}
.block-head .count-pill{background:var(--sun);color:#5a4406;font-weight:800;font-size:.75rem;padding:.2em .6em;border-radius:999px}
.block-head .allread{color:var(--muted);font-weight:800;font-size:.8rem;margin-left:auto}

.novetats{position:relative}
.deck{position:relative;max-width:540px;margin:2px auto 10px}
.deck-ghost{position:absolute;inset:0;background:var(--panel);border:1.5px solid var(--line);
  border-radius:var(--r-lg);box-shadow:var(--shadow-sm);transform-origin:top center}
.nov-card{position:relative;z-index:20;background:var(--panel);border:1.5px solid var(--line);
  border-radius:var(--r-lg);padding:18px 18px 16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:11px;overflow:hidden;cursor:pointer}
.nov-card .sec-tag{align-self:flex-start}
.nov-card h4{margin:0;font-family:var(--font-d);font-weight:600;font-size:1.12rem;color:var(--teal-ink);line-height:1.2}
.nov-card p{margin:0;color:#3d6472;font-weight:600;font-size:.94rem;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.nov-card .foot{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:6px}
.nov-card .foot .date{color:var(--muted);font-weight:700;font-size:.78rem}
.nov-card .read-btn{margin-left:auto;background:linear-gradient(180deg,var(--cyan),#38B4D2);border:none;color:#063341;font-weight:800;
  font-size:.82rem;padding:.55em .9em;border-radius:11px;display:flex;align-items:center;gap:.4em;box-shadow:0 6px 14px -7px rgba(20,101,127,.6)}
.nov-card .read-btn:hover{filter:brightness(1.04)}
.deck-hint{text-align:center;color:var(--muted);font-weight:800;font-size:.8rem;margin-top:2px}
.nov-empty{background:var(--panel);border:1.5px dashed var(--line);border-radius:var(--r-lg);padding:22px;
  display:flex;align-items:center;gap:14px;color:var(--muted);font-weight:700;max-width:540px;margin:0 auto}
.nov-empty .big{font-size:1.6rem}

/* ---------- BENTO d'àrees ---------- */
.bento{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.tile{position:relative;border:none;text-align:left;border-radius:var(--r-lg);padding:18px;color:#fff;
  overflow:hidden;min-height:132px;display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:var(--shadow);transition:transform .16s cubic-bezier(.2,1.3,.4,1), box-shadow .2s;isolation:isolate}
.tile:hover{transform:translateY(-5px)}
.tile:hover .t-burst span{opacity:1}
.tile .t-burst{position:absolute;inset:0;z-index:0}
.tile .t-burst span{background:rgba(255,255,255,.9);transition:opacity .25s}
.tile .t-ico{width:34px;height:34px;border-radius:11px;background:rgba(255,255,255,.22);display:grid;place-items:center;position:relative;z-index:1}
.tile .t-ico .icon{width:20px;height:20px;stroke:#fff;stroke-width:2.6}
.tile .t-body{position:relative;z-index:1}
.tile h3{font-family:var(--font-d);font-weight:600;font-size:1.12rem;margin:0;line-height:1.1}
.tile .t-meta{font-weight:800;font-size:.8rem;opacity:.92;margin-top:3px;display:flex;align-items:center;gap:.4em}
.tile .t-badge{position:absolute;top:14px;right:14px;z-index:2;background:var(--sun);color:#5a4406;
  font-weight:800;font-size:.74rem;min-width:1.6em;height:1.6em;padding:0 .45em;border-radius:999px;display:grid;place-items:center;
  box-shadow:0 4px 10px -3px rgba(0,0,0,.3)}
/* sizes */
.tile.big{grid-column:span 4}
.tile.med{grid-column:span 4}
.tile.reg{grid-column:span 3}
.tile-pill-wrap{grid-column:span 12;display:flex;justify-content:center;margin-top:2px}
.tile-pill{position:relative;display:inline-flex;align-items:center;gap:10px;border:none;border-radius:14px;padding:11px 24px;
  color:#fff;font-family:var(--font-d);font-weight:600;font-size:1rem;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .15s,box-shadow .2s}
.tile-pill:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.tile-pill .icon{width:18px;height:18px;stroke:#fff;stroke-width:2.6}
.pill-badge{background:var(--sun);color:#5a4406;font-weight:800;font-size:.72rem;min-width:1.5em;height:1.5em;padding:0 .4em;border-radius:999px;display:grid;place-items:center;margin-left:2px}

/* ---------- SECTION VIEW ---------- */
#section{margin-top:6px}
.sec-hero{border-radius:var(--r-lg);padding:20px 22px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow);margin-bottom:18px}
.sec-hero .t-burst{position:absolute;inset:0}
.sec-hero .t-burst span{background:rgba(255,255,255,.85)}
.sec-hero .row{position:relative;z-index:1;display:flex;align-items:center;gap:14px}
.sec-hero .t-ico{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.22);display:grid;place-items:center}
.sec-hero .t-ico .icon{width:26px;height:26px;stroke:#fff}
.sec-hero h2{font-family:var(--font-d);font-weight:600;font-size:1.6rem;margin:0}
.sec-hero p{margin:2px 0 0;font-weight:700;opacity:.92;font-size:.9rem}

.composer{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.composer .grid{display:grid;gap:10px}
.field label{display:block;font-weight:800;font-size:.78rem;color:var(--muted);margin:0 0 5px 2px}
.input,textarea.input,select.input{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:.7em .85em;
  font-family:inherit;font-weight:700;color:var(--teal-ink);background:var(--paper);font-size:.95rem}
.input:focus{border-color:var(--cyan);background:#fff}
textarea.input{resize:vertical;min-height:74px}
.composer .row2{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.composer .row2 .field{flex:1;min-width:150px}
.composer .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:2px}

/* entry feed */
.feed{display:grid;gap:12px}
.entry{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-sm);position:relative}
.entry.unread{border-color:var(--sun);box-shadow:0 0 0 3px rgba(244,206,94,.28),var(--shadow-sm)}
.entry .head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.entry .head .avatar{width:34px;height:34px;font-size:.85rem}
.entry .head b{font-family:var(--font-d);font-weight:600}
.entry .head .date{color:var(--muted);font-weight:700;font-size:.8rem}
.entry .head .newdot{width:9px;height:9px;border-radius:50%;background:var(--sun-deep);box-shadow:0 0 0 4px rgba(244,206,94,.3)}
.entry h4{margin:0 0 4px;font-family:var(--font-d);font-weight:600;font-size:1.1rem;color:var(--teal-ink)}
.entry .body{white-space:pre-wrap;font-weight:600;color:#33555f;line-height:1.5}
.entry .link{display:inline-flex;align-items:center;gap:.4em;margin-top:10px;background:var(--panel-2);
  color:var(--teal);font-weight:800;font-size:.82rem;padding:.45em .8em;border-radius:10px;text-decoration:none}
.entry .link:hover{background:#d7eff5}
.entry .del{position:absolute;top:12px;right:12px;background:transparent;border:none;color:#c3d6dd;padding:4px;border-radius:8px}
.entry .del:hover{color:var(--cristina);background:#fbeaf1}
.entry .foot-actions{margin-top:10px;display:flex;gap:8px}
.card-tools{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:4px}
.card-tools .del,.card-tools .edit-btn{position:static;top:auto;right:auto}
.edit-btn{background:transparent;border:none;color:#c3d6dd;padding:4px;border-radius:8px}
.edit-btn:hover{color:var(--teal);background:var(--panel-2)}
.entry.editing,.task.editing{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(79,195,222,.25),var(--shadow-sm)}
.entry.editing .field,.task.editing .field{margin-bottom:10px}
.edit-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:6px}
.editing .btn{padding:.55em .95em;font-size:.85rem}
.edited-tag{color:var(--sun-deep);font-weight:800;font-size:.74rem}
.task .move{margin-top:10px}
.task-tools{display:flex;gap:2px;margin-left:auto}

/* ---------- KANBAN ---------- */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.col{background:var(--panel-2);border-radius:var(--r-lg);padding:12px;min-height:120px}
.col.drop{outline:2.5px dashed var(--cyan);outline-offset:-4px}
.col-head{display:flex;align-items:center;gap:8px;font-family:var(--font-d);font-weight:600;font-size:1rem;margin:2px 4px 10px;color:var(--teal-ink)}
.col-head .dot{width:11px;height:11px;border-radius:50%}
.col-head .n{margin-left:auto;background:#fff;color:var(--muted);font-weight:800;font-size:.78rem;padding:.1em .55em;border-radius:999px}
.task{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;padding:13px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:grab}
.task:active{cursor:grabbing}
.task.dragging{opacity:.5}
.task h5{margin:0 0 5px;font-family:var(--font-d);font-weight:600;font-size:1rem;color:var(--teal-ink)}
.task .desc{font-weight:600;color:#4a6d77;font-size:.88rem;line-height:1.4;margin:0 0 9px;white-space:pre-wrap}
.task .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.task .link{display:inline-flex;align-items:center;gap:.3em;background:var(--panel-2);color:var(--teal);font-weight:800;font-size:.76rem;padding:.35em .6em;border-radius:9px;text-decoration:none}
.task .move{display:flex;gap:5px;margin-top:10px}
.task .move button{flex:1;border:1.5px solid var(--line);background:var(--paper);color:var(--muted);font-weight:800;
  font-size:.72rem;padding:.4em;border-radius:9px}
.task .move button.on{color:#fff;border-color:transparent}
.task .del{background:transparent;border:none;color:#c3d6dd;padding:3px;border-radius:7px;margin-left:auto}
.task .del:hover{color:var(--cristina)}
.task .toprow{display:flex;align-items:flex-start;gap:8px}
.task .toprow h5{flex:1}
.col-empty{color:var(--muted);font-weight:700;font-size:.85rem;text-align:center;padding:16px 8px;opacity:.7}
.kan-controls{display:flex;justify-content:flex-end;margin-bottom:12px}
.kan-toggle{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1.5px solid var(--line);
  border-radius:12px;padding:8px 14px;font-weight:800;color:var(--teal);box-shadow:var(--shadow-sm);transition:.15s}
.kan-toggle .icon{width:16px;height:16px;stroke-width:2.2}
.kan-toggle:hover{border-color:var(--cyan)}
.kan-toggle.on{background:linear-gradient(180deg,var(--cyan),#38B4D2);color:#063341;border-color:transparent}
.kan-group-head{display:flex;align-items:center;gap:7px;margin:10px 3px 7px;font-weight:800;font-size:.78rem;color:var(--teal-ink)}
.kan-group-head .dot{width:9px;height:9px;border-radius:50%;flex:none}
.kan-group-head .n{margin-left:auto;color:var(--muted);font-size:.72rem;background:#fff;padding:.05em .5em;border-radius:999px}

/* ---------- editor de text enriquit + taules ---------- */
.rich{border:1.5px solid var(--line);border-radius:14px;background:var(--paper);overflow:hidden}
.rich-tb{display:flex;flex-wrap:wrap;gap:5px;padding:7px;background:var(--panel-2);border-bottom:1.5px solid var(--line)}
.rich-btn{border:none;background:#fff;border-radius:9px;padding:.4em .7em;font-weight:800;font-size:.82rem;color:var(--teal);box-shadow:var(--shadow-sm)}
.rich-btn:hover{background:#eaf6fa}
.rich-btn.on{background:var(--cyan);color:#063341;box-shadow:inset 0 0 0 2px rgba(6,51,65,.15)}
.rich-sep{width:1px;background:var(--line);margin:3px 2px}
.rich-ed{min-height:120px;padding:12px;font-weight:500;color:var(--teal-ink);line-height:1.5;outline:none;background:#fff}
.rich-ed:empty:before{content:'Escriu aquí… (pots inserir taules)';color:#9db8c2}
.rich-ed b,.rich-ed strong,.rich-body b,.rich-body strong{font-weight:800}
.rich-ed i,.rich-ed em,.rich-body i,.rich-body em{font-style:italic;font-weight:inherit}
.rich-ed table,.rich-body table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.9rem}
.rich-ed th,.rich-ed td,.rich-body th,.rich-body td{border:1.5px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
.rich-ed th,.rich-body th{background:var(--panel-2);font-weight:800;color:var(--teal-ink)}
.rich-ed ul,.rich-body ul,.rich-ed ol,.rich-body ol{margin:6px 0;padding-left:22px}
.rich-body{white-space:normal!important;font-weight:500}
.rich-body p{margin:6px 0}
.rich-body table{max-width:100%;display:block;overflow-x:auto}

/* ---------- floating launcher ---------- */
.launcher{position:fixed;right:20px;bottom:22px;z-index:40}
.launch-btn{width:60px;height:60px;border-radius:20px;border:none;background:linear-gradient(180deg,var(--teal),#0c4e63);
  color:#fff;display:grid;place-items:center;box-shadow:0 14px 30px -8px rgba(12,70,88,.6);transition:transform .16s}
.launch-btn:hover{transform:translateY(-3px) rotate(-4deg)}
.launch-btn .icon{width:26px;height:26px;stroke-width:2.6}
.sheet{position:fixed;inset:0;z-index:45;display:none;align-items:flex-end;justify-content:center}
.sheet.open{display:flex}
.sheet .scrim{position:absolute;inset:0;background:rgba(9,50,63,.42);backdrop-filter:blur(2px);animation:fade .2s}
@keyframes fade{from{opacity:0}}
.sheet .panel{position:relative;z-index:1;background:var(--paper);width:min(560px,100%);border-radius:26px 26px 0 0;
  padding:16px 16px 26px;box-shadow:0 -20px 50px -20px rgba(0,0,0,.4);animation:up .28s cubic-bezier(.2,1,.3,1)}
@keyframes up{from{transform:translateY(30px);opacity:.6}}
.sheet .grab{width:44px;height:5px;border-radius:5px;background:var(--line);margin:0 auto 12px}
.sheet h3{font-family:var(--font-d);font-weight:600;text-align:center;margin:0 0 12px;color:var(--teal)}
.sheet .qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.qbtn{display:flex;align-items:center;gap:10px;background:var(--panel);border:1.5px solid var(--line);border-radius:16px;
  padding:11px;text-align:left;font-weight:800;color:var(--teal-ink)}
.qbtn:hover{border-color:var(--cyan)}
.qbtn .qi{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;color:#fff;flex:none}
.qbtn .qi .icon{width:19px;height:19px;stroke:#fff}
.qbtn .qn{font-size:.9rem;line-height:1.1}
.qbtn .qb{margin-left:auto;background:var(--sun);color:#5a4406;font-weight:800;font-size:.72rem;padding:.1em .5em;border-radius:999px}

/* toast */
/* ---------- CERCADOR ---------- */
.search-overlay{position:fixed;inset:0;z-index:55;display:none}
.search-overlay.open{display:block}
.search-overlay .scrim{position:absolute;inset:0;background:rgba(9,50,63,.42);backdrop-filter:blur(2px);animation:fade .2s}
.search-panel{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:16px 14px}
.search-bar{display:flex;align-items:center;gap:10px;background:#fff;border-radius:20px;padding:13px 15px;box-shadow:var(--shadow);animation:sdown .26s cubic-bezier(.2,1,.3,1)}
@keyframes sdown{from{transform:translateY(-18px);opacity:.4}}
.search-bar .icon{width:22px;height:22px;stroke:var(--muted);flex:none}
.search-bar input{flex:1;min-width:0;border:none;outline:none;font-family:inherit;font-weight:700;font-size:1.05rem;color:var(--teal-ink);background:transparent}
.search-bar input::placeholder{color:#9db8c2;font-weight:700}
.search-bar .close{background:var(--panel-2);border:none;border-radius:11px;color:var(--muted);font-weight:800;width:34px;height:34px;flex:none;font-size:1rem}
.search-bar .close:hover{background:#dceff4}
.search-results{margin-top:12px;display:grid;gap:10px;max-height:66vh;overflow:auto;padding:2px}
.sres{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow-sm);cursor:pointer;text-align:left;width:100%;animation:sdown .2s}
.sres:hover{border-color:var(--cyan);transform:translateY(-1px)}
.sres .avatar{width:32px;height:32px;font-size:.82rem;flex:none}
.sres .body{flex:1;min-width:0}
.sres .top{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.sres h5{margin:0 0 3px;font-family:var(--font-d);font-weight:600;font-size:1.02rem;color:var(--teal-ink);line-height:1.2}
.sres p{margin:0;color:#4a6d77;font-weight:600;font-size:.86rem;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.search-empty{text-align:center;color:var(--muted);font-weight:700;padding:26px 16px;background:#fff;border-radius:16px;box-shadow:var(--shadow-sm)}
.flash{animation:flash 1.7s ease}
@keyframes flash{0%,32%{box-shadow:0 0 0 3px var(--sun-deep),var(--shadow-sm)}100%{box-shadow:var(--shadow-sm)}}

/* ---------- MODAL confirmació ---------- */
.modal{position:fixed;inset:0;z-index:65;display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal .scrim{position:absolute;inset:0;background:rgba(9,50,63,.5);backdrop-filter:blur(2px);animation:fade .2s}
.modal-box{position:relative;z-index:1;background:#fff;width:min(400px,100%);border-radius:24px;padding:26px 24px 20px;text-align:center;box-shadow:var(--shadow);animation:up .26s cubic-bezier(.2,1,.3,1)}
.modal-ico{font-size:2rem;margin-bottom:4px}
.modal-box h3{font-family:var(--font-d);font-weight:600;font-size:1.25rem;margin:0 0 6px;color:var(--teal-ink)}
.modal-box p{color:var(--muted);font-weight:700;margin:0 0 20px;line-height:1.45}
.modal-actions{display:flex;gap:10px;justify-content:center}
.modal-actions .btn{flex:1;justify-content:center}
.btn-danger{background:linear-gradient(180deg,#EC6A88,#DB4F72);color:#fff;box-shadow:0 8px 18px -8px rgba(219,79,114,.6)}
.btn-danger:hover{filter:brightness(1.03)}

/* ---------- SUBTEMES ---------- */
.add-sub{display:flex;gap:10px;align-items:flex-end}
.add-sub .field{flex:1}
.subtheme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:14px}
.subtheme-card{position:relative;text-align:left;border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px;background:var(--panel);
  box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .16s,box-shadow .2s,border-color .2s;min-height:104px;display:flex;flex-direction:column;justify-content:space-between}
.subtheme-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--cyan)}
.subtheme-card .st-name{font-family:var(--font-d);font-weight:600;font-size:1.08rem;color:var(--teal-ink);line-height:1.15;padding-right:30px}
.subtheme-card .st-meta{font-weight:800;font-size:.8rem;color:var(--muted);margin-top:6px}
.subtheme-card .st-bar{height:5px;border-radius:5px;margin-top:10px;opacity:.9}
.subtheme-card .st-badge{position:absolute;top:11px;right:36px;background:var(--sun);color:#5a4406;font-weight:800;font-size:.72rem;min-width:1.5em;height:1.5em;padding:0 .4em;border-radius:999px;display:grid;place-items:center}
.subtheme-card .del{position:absolute;top:8px;right:8px;background:transparent;border:none;color:#c3d6dd;
  padding:5px;border-radius:9px;line-height:0;opacity:.55;transition:color .15s,background .15s,opacity .15s}
.subtheme-card .del .icon{width:15px;height:15px;stroke-width:2.2}
.subtheme-card:hover .del{opacity:.9}
.subtheme-card .del:hover{opacity:1;color:var(--cristina);background:var(--panel-2)}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);border:none;color:#fff;font-weight:800;
  font-size:.82rem;padding:.42em .85em;border-radius:999px;margin-bottom:12px;position:relative;z-index:1}
.back-btn:hover{background:rgba(255,255,255,.34)}
.back-btn .icon{width:1em;height:1em;stroke-width:3}

/* ---------- COSES A FER dins d'entrades ---------- */
.todos{margin-top:12px;border-top:1.5px dashed var(--line);padding-top:11px}
.todos-title{font-weight:800;font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.todos-title .icon{width:14px;height:14px;stroke-width:2.6}
.todo{display:flex;align-items:center;gap:9px;padding:5px 0}
.todo .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);background:#fff;flex:none;display:grid;place-items:center;cursor:pointer;transition:.15s;padding:0}
.todo .box:hover{border-color:var(--acabada)}
.todo.done .box{background:var(--acabada);border-color:var(--acabada)}
.todo .box .icon{width:13px;height:13px;stroke:#fff;stroke-width:3.5;opacity:0}
.todo.done .box .icon{opacity:1}
.todo .txt{flex:1;font-weight:700;color:var(--teal-ink);font-size:.92rem;line-height:1.3}
.todo.done .txt{text-decoration:line-through;color:var(--muted)}
.todo .owner-sel{border:1.5px solid var(--line);border-radius:9px;padding:.28em .4em;font-family:inherit;font-weight:800;font-size:.72rem;color:var(--teal);background:var(--paper);flex:none}
.todo .rm{background:transparent;border:none;color:#c9dbe1;padding:3px;border-radius:7px;line-height:0;flex:none}
.todo .rm .icon{width:14px;height:14px}
.todo .rm:hover{color:var(--cristina);background:var(--panel-2)}
.add-todo-toggle{background:transparent;border:1.5px dashed var(--line);color:var(--muted);font-weight:800;font-size:.82rem;border-radius:11px;padding:.5em .8em;margin-top:9px;width:100%;display:flex;align-items:center;justify-content:center;gap:.35em}
.add-todo-toggle:hover{border-color:var(--cyan);color:var(--teal)}
.todo-add{display:flex;gap:7px;align-items:center;margin-top:9px;flex-wrap:wrap}
.todo-add input{flex:1;min-width:130px;border:1.5px solid var(--line);border-radius:11px;padding:.55em .75em;font-family:inherit;font-weight:700;font-size:.9rem;background:var(--paper)}
.todo-add input:focus{border-color:var(--cyan);background:#fff;outline:none}
.todo-add select{border:1.5px solid var(--line);border-radius:11px;padding:.55em .5em;font-family:inherit;font-weight:800;font-size:.78rem;color:var(--teal);background:var(--paper)}
.todo-add .go{border:none;background:linear-gradient(180deg,var(--cyan),#38B4D2);color:#063341;font-weight:800;border-radius:11px;padding:.55em .85em;font-size:.84rem}

/* panell central de coses a fer soltes */
.loose{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.loose-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.loose-head h3{font-family:var(--font-d);font-weight:600;font-size:1.12rem;margin:0;color:var(--teal-ink)}
.loose-count{background:var(--sun);color:#5a4406;font-weight:800;font-size:.75rem;padding:.15em .55em;border-radius:999px}
.loose-sub{color:var(--muted);font-weight:700;font-size:.82rem;margin:0 0 6px}
.loose-empty{color:var(--muted);font-weight:700;font-size:.9rem;padding:6px 0}
.loose-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.loose-row .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);background:#fff;flex:none;display:grid;place-items:center;cursor:pointer}
.loose-row .box:hover{border-color:var(--acabada)}
.loose-row .box .icon{width:13px;height:13px;stroke:var(--acabada);stroke-width:3.5;opacity:0}
.loose-row .box:hover .icon{opacity:.55}
.loose-txt{flex:1;font-weight:700;color:var(--teal-ink);font-size:.92rem;line-height:1.3}
.loose-origin{background:var(--panel-2);border:none;color:var(--teal);font-weight:800;font-size:.74rem;padding:.4em .65em;border-radius:9px;white-space:nowrap;cursor:pointer;flex:none}
.loose-origin:hover{background:#d7eff5}

.task .origin{display:inline-flex;align-items:center;gap:.3em;background:var(--panel-2);color:var(--teal);font-weight:800;font-size:.72rem;padding:.32em .55em;border-radius:9px;cursor:pointer;border:none;line-height:1}
.task .origin:hover{background:#d7eff5}
.todos-sub{font-weight:700;font-size:.72rem;color:var(--muted);margin:-2px 0 7px}
/* ---------- calaix plegable (botó llapis) ---------- */
.composer-wrap{margin-bottom:18px}
.composer-trigger{display:inline-flex;align-items:center;gap:9px;background:var(--panel);border:1.5px solid var(--line);
  border-radius:14px;padding:10px 16px;font-weight:800;color:var(--teal);box-shadow:var(--shadow-sm);transition:.15s}
.composer-trigger:hover{border-color:var(--cyan);transform:translateY(-1px)}
.composer-trigger.active{background:linear-gradient(180deg,var(--cyan),#38B4D2);color:#063341;border-color:transparent}
.composer-trigger .icon{width:18px;height:18px;stroke-width:2.6}
.composer.composer-collapsed{display:none;margin-bottom:0;margin-top:12px}
.composer.composer-collapsed.open{display:block;animation:sdown .22s ease}
.composer-close-row{display:flex;justify-content:flex-end;margin-bottom:8px}
.composer-close{display:inline-flex;align-items:center;gap:.35em;background:var(--panel-2);border:none;border-radius:10px;
  color:var(--muted);font-weight:800;font-size:.78rem;padding:.4em .7em}
.composer-close .icon{width:14px;height:14px;stroke-width:2.6}
.composer-close:hover{background:#fbeaf1;color:var(--cristina)}

.todo .status{font-size:.66rem;font-weight:800;padding:.15em .5em;border-radius:999px;color:#fff;flex:none}

/* ---------- ENLLAÇOS (botons) ---------- */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.link-card{position:relative;display:flex;align-items:center;gap:12px;background:var(--panel);border:1.5px solid var(--line);
  border-radius:16px;padding:14px;box-shadow:var(--shadow-sm);cursor:pointer;text-decoration:none;color:inherit;
  transition:transform .15s,box-shadow .2s,border-color .2s;min-height:66px}
.link-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--cyan)}
.link-card .li{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none}
.link-card .li .icon{width:20px;height:20px;stroke:#fff;stroke-width:2.4}
.link-card .ln{font-family:var(--font-d);font-weight:600;font-size:1rem;color:var(--teal-ink);line-height:1.15;flex:1;min-width:0;padding-right:34px;word-break:break-word}
.link-card .tools{position:absolute;top:7px;right:7px;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.link-card:hover .tools{opacity:1}
.link-card .tools .del{position:static}

/* ---------- CALENDARI ---------- */
.cal-toggle{display:inline-flex;background:var(--panel-2);border-radius:14px;padding:4px;gap:3px;margin-bottom:16px}
.cal-tab{position:relative;display:inline-flex;align-items:center;gap:7px;border:none;background:transparent;color:var(--muted);font-weight:800;
  font-size:.88rem;padding:.5em .95em;border-radius:11px;transition:.15s}
.cal-tab .icon{width:16px;height:16px;stroke-width:2.4}
.cal-tab.on{background:#fff;color:var(--teal);box-shadow:var(--shadow-sm)}
.cal-tab .tab-badge{position:absolute;top:-6px;right:-5px;background:#EC6A88;color:#fff;min-width:18px;height:18px;
  font-size:.68rem;font-weight:800;border-radius:999px;display:grid;place-items:center;padding:0 4px;box-shadow:0 3px 8px -2px rgba(0,0,0,.3)}
.cal-legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;padding:2px 2px}
.leg-item{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.8rem;color:var(--teal-ink)}
.leg-dot{width:12px;height:12px;border-radius:50%;flex:none}
.grp-pill{color:#fff;font-weight:800;font-size:.7rem;padding:.15em .55em;border-radius:999px;line-height:1.3}
.cal-daybox{text-align:center;border-radius:14px;padding:8px 12px;font-family:var(--font-d);min-width:64px;flex:none}
.cal-daybox .d{font-size:1.5rem;font-weight:600;line-height:1}
.cal-daybox .mo{font-weight:700;font-size:.72rem;text-transform:uppercase}
.cal-time{display:inline-flex;align-items:center;gap:.35em;color:var(--teal);font-weight:800;font-size:.82rem;margin-top:2px}
.cal-monthhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cal-nav{width:38px;height:38px;border-radius:11px;border:1.5px solid var(--line);background:var(--panel);color:var(--teal);font-size:1.3rem;font-weight:800;line-height:1;box-shadow:var(--shadow-sm)}
.cal-nav:hover{border-color:var(--cyan)}
.cal-monthtitle{font-family:var(--font-d);font-weight:600;font-size:1.3rem;color:var(--teal-ink);flex:1}
.cal-today{border:1.5px solid var(--line);background:var(--panel);color:var(--teal);font-weight:800;border-radius:11px;padding:.5em .9em;box-shadow:var(--shadow-sm)}
.cal-today:hover{border-color:var(--cyan)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-wd{text-align:center;font-weight:800;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:4px 0}
.cal-cell{background:var(--panel);border:1.5px solid var(--line);border-radius:12px;min-height:92px;padding:6px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:border-color .15s,background .15s;overflow:hidden}
.cal-cell:hover{border-color:var(--cyan)}
.cal-cell.blank{background:transparent;border:none;cursor:default}
.cal-cell.today{border-color:var(--sun-deep);background:#fffdf3}
.cal-num{font-weight:800;font-size:.82rem;color:var(--teal-ink);align-self:flex-start;padding:1px 5px;border-radius:7px}
.cal-cell.today .cal-num{background:var(--sun-deep);color:#fff}
.cal-chip{border:none;color:#fff;font-weight:700;font-size:.68rem;text-align:left;padding:.25em .4em;border-radius:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.25}
.cal-chip:hover{filter:brightness(1.06)}
.cal-more{font-weight:800;font-size:.66rem;color:var(--muted);padding-left:3px}
@media(max-width:620px){
  .cal-cell{min-height:70px;border-radius:9px;padding:4px}
  .cal-grid{gap:4px}
  .cal-chip{font-size:.6rem}
  .cal-num{font-size:.74rem}
}

#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);z-index:70;
  background:var(--teal-ink);color:#fff;font-weight:800;padding:.7em 1.1em;border-radius:14px;box-shadow:var(--shadow);
  opacity:0;transition:.25s;pointer-events:none;font-size:.9rem}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-feed{background:var(--panel);border:1.5px dashed var(--line);border-radius:var(--r-lg);padding:26px;text-align:center;color:var(--muted);font-weight:700}
.empty-feed .big{font-size:1.8rem;margin-bottom:4px}

/* ---------- responsive ---------- */
@media(max-width:760px){
  #app{padding:16px 14px 130px}
  .bento{grid-template-columns:repeat(2,1fr)}
  .tile.reg{grid-column:span 1}
  .tile.big,.tile.med{grid-column:span 2}
  .tile-pill-wrap{grid-column:span 2}
  .kanban{grid-template-columns:1fr;}
  .hero-logo{width:88%}
  .sheet .qgrid{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>

<!-- ================= LOGIN ================= -->
<div id="login">

    <div class="who" id="whoList"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<main id="app" class="hidden">
  <div class="topbar">
    <button class="home-pill" id="homeBtn" title="Inici">
      <img id="pillMark" alt="">
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>

    <button class="search-pill" id="searchBtn" title="Cerca">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <span class="lbl">Cerca</span>

    <div class="me">
      <span class="avatar" id="meAv"></span>
      <span id="meName"></span>
      <button id="logoutBtn">Canvia</button>
    </div>
  </div>

  <!-- HOME -->
  <section id="home">
    <div class="hero">
      <div class="rays burst" id="heroRays"></div>
      <img class="hero-logo" id="heroLogo" alt="Coordinació — 2n de primària 2026-2027">
    </div>

    <div class="block" id="dashBlock">
      <div class="home-cols" id="dashCols"></div>
    </div>

    <div class="block" id="novBlock">
      <div class="block-head">
        <h2>Novetats</h2>
        <span class="count-pill" id="novCount">0</span>
        <span class="allread" id="allRead"></span>
      </div>
      <div class="novetats" id="novetats"></div>
    </div>

    <div class="block">
      <div class="block-head"><h2>Les nostres àrees</h2></div>

    </div>

  <!-- SECTION -->
  <section id="section" class="hidden"></section>
</main>

<!-- floating launcher -->
<div class="launcher hidden" id="launcher">

    <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
  </button>
</div>
<div class="sheet" id="sheet">

  </div>
</div>

<!-- cercador global -->
<div class="search-overlay" id="search">
  <div class="scrim" data-sclose></div>
  <div class="search-panel">
    <div class="search-bar">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>

      <button class="close" id="searchClose" aria-label="Tanca">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- popup de confirmació -->
<div class="modal" id="confirm">

      <button class="btn btn-ghost" id="confirmNo">Cancel·la</button>
      <button class="btn btn-danger" id="confirmYes">Esborra</button>
    </div>
  </div>
</div>

const STORE_KEY = 'coordinacio_2n_demo_v15';

function safeLoad(){ try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }

/* --- API única: avui DEMO, demà Sheets (mateixa firma) --- */
const api = {
  async init(){
    if(DEMO_MODE){
      const cached = safeLoad();
      STATE = cached || seed();
      normalizeState();
      if(!cached) safeSave();
      return STATE;
    }
    // ---------- MODE NÚVOL (Google Sheets) ----------
    try{
      const state = await request('getState');
      STATE = state || {entries:[],tasks:[],subthemes:[],avaluacio:{}};
      normalizeState();
      // primera arrencada: si el full és buit, hi sembra els subtemes per defecte
      if(!STATE.subthemes || !STATE.subthemes.length){
        STATE.subthemes = buildDefaultSubthemes();
        await request('setSubthemes', STATE.subthemes);
      }
      if(!STATE.avaluacio || !Object.keys(STATE.avaluacio).length){
        STATE.avaluacio = buildDefaultAvaluacio();
        await request('setAvaluacio', STATE.avaluacio);
      }
      safeSave();                 // còpia local (només com a cache de reserva)
      return STATE;
    }catch(err){
      const cached = safeLoad();
      if(cached){ STATE=cached; normalizeState(); toast('Sense connexió: mostrant l\u2019última còpia'); return STATE; }
      STATE={entries:[],tasks:[],subthemes:[],avaluacio:{}}; normalizeState();
      alert('No s\u2019ha pogut connectar amb el Google Sheets.\nRevisa la URL de CONFIG.WEB_APP_URL i que el desplegament sigui \u201cQualsevol\u201d.');
      return STATE;
    }
  },
  async addEntry(e){ STATE.entries.unshift(e); await persist('addEntry', e); },
  async updateEntry(e){ const i=STATE.entries.findIndex(x=>x.id===e.id); if(i>-1) STATE.entries[i]=e; await persist('updateEntry', e); },
  async deleteEntry(id){ STATE.entries=STATE.entries.filter(x=>x.id!==id); await persist('deleteEntry',{id}); },
  async addTask(t){ STATE.tasks.unshift(t); await persist('addTask', t); },
  async updateTask(t){ const i=STATE.tasks.findIndex(x=>x.id===t.id); if(i>-1) STATE.tasks[i]=t; await persist('updateTask', t); },
  async deleteTask(id){ STATE.tasks=STATE.tasks.filter(x=>x.id!==id); await persist('deleteTask',{id}); },
  async addSubtheme(s){ STATE.subthemes.push(s); await persist('addSubtheme', s); },
  async deleteSubtheme(id){ STATE.subthemes=STATE.subthemes.filter(x=>x.id!==id); STATE.entries=STATE.entries.filter(e=>e.subtheme!==id); await persist('deleteSubtheme',{id}); },
  async avUpsert(tri, subj, level){ await persist('avUpsertLevel', {tri, subj, level}); },
  async avDelete(tri, subj, id){ await persist('avDeleteLevel', {tri, subj, id}); },
};
async function persist(action, payload){
  if(DEMO_MODE){ safeSave(); return; }
  try{ await request(action, payload); safeSave(); }
  catch(err){ safeSave(); toast('⚠️ No s\u2019ha pogut desar al núvol'); }
}
function normalizeState(){
  if(!STATE.subthemes) STATE.subthemes=[];
  if(!STATE.avaluacio) STATE.avaluacio={};
  if(!STATE.students) STATE.students={};
  (STATE.entries||[]).forEach(e=>{ e.readBy=e.readBy||[]; e.createdAt=e.createdAt||e.date; e.updatedAt=e.updatedAt||e.createdAt; });
  (STATE.tasks||[]).forEach(t=>{ t.readBy=t.readBy||[t.author]; t.createdAt=t.createdAt||t.date; t.updatedAt=t.updatedAt||t.createdAt; });
}
/* crida a l'Apps Script (POST text/plain → sense preflight de CORS) */
async function request(action, payload){
  const res = await fetch(CONFIG.WEB_APP_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, payload, secret:CONFIG.SECRET})
  });
  const data = await res.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}

function startCloudSync(){
  if(DEMO_MODE) return;

}

let ME = null;
const $ = s => document.querySelector(s);
const el = (t,c)=>{const n=document.createElement(t);if(c)n.className=c;return n;};
const fmtDate = iso => new Date(iso).toLocaleDateString('ca-ES',{day:'numeric',month:'short'});
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const stripHtml = s => (s||'').replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
function sanitizeHtml(html){
  const tpl=document.createElement('template'); tpl.innerHTML=html||'';
  const allowed=new Set(['P','BR','B','STRONG','I','EM','U','UL','OL','LI','TABLE','THEAD','TBODY','TR','TH','TD','DIV','SPAN','A','H4','H5']);
  const walk=node=>{
    Array.from(node.childNodes).forEach(ch=>{
      if(ch.nodeType===1){
        if(!allowed.has(ch.nodeName)){ node.replaceChild(document.createTextNode(ch.textContent), ch); return; }
        Array.from(ch.attributes).forEach(a=>{
          const n=a.name.toLowerCase();
          const keep = (ch.nodeName==='A' && n==='href' && !/^\s*javascript:/i.test(a.value));
          if(!keep) ch.removeAttribute(a.name);
        });
        if(ch.nodeName==='A'){ ch.setAttribute('target','_blank'); ch.setAttribute('rel','noopener'); }
        walk(ch);
      }
    });
  };
  walk(tpl.content);
  return tpl.innerHTML;
}
/* editor de text enriquit amb taules */
function richEditor(initialHtml){
  const wrap=el('div','rich');
  const tb=el('div','rich-tb');
  const ed=el('div','rich-ed'); ed.contentEditable='true'; ed.innerHTML=initialHtml||'';
  const btn=(label,title,fn)=>{ const b=el('button','rich-btn'); b.type='button'; b.title=title; b.innerHTML=label;
    b.onmousedown=e=>e.preventDefault(); b.onclick=()=>{ ed.focus(); fn(); }; return b; };
  const sep=()=>el('span','rich-sep');
  const bBold=btn('<b>N</b>','Negreta',()=>{document.execCommand('bold'); updateStates();});
  const bItal=btn('<i>C</i>','Cursiva',()=>{document.execCommand('italic'); updateStates();});
  const bUnd=btn('<span style="text-decoration:underline">S</span>','Subratllat',()=>{document.execCommand('underline'); updateStates();});
  function updateStates(){
    try{
      bBold.classList.toggle('on', document.queryCommandState('bold'));
      bItal.classList.toggle('on', document.queryCommandState('italic'));
      bUnd.classList.toggle('on', document.queryCommandState('underline'));
    }catch(e){}
  }
  ed.addEventListener('keyup',updateStates);
  ed.addEventListener('mouseup',updateStates);
  ed.addEventListener('focus',updateStates);
  tb.appendChild(bBold);
  tb.appendChild(bItal);
  tb.appendChild(bUnd);

  tb.appendChild(btn('− Fila','Treu l\u2019última fila',()=>tableDelRow(ed)));
  tb.appendChild(btn('− Col','Treu l\u2019última columna',()=>tableDelCol(ed)));

function insertTable(ed){
  let html='<table><thead><tr><th>Títol</th><th>Títol</th></tr></thead><tbody>';
  html+='<tr><td>&nbsp;</td><td>&nbsp;</td></tr><tr><td>&nbsp;</td><td>&nbsp;</td></tr>';
  html+='</tbody></table><p><br></p>';
  document.execCommand('insertHTML', false, html);
}
function currentTable(ed){
  const sel=window.getSelection(); if(!sel || !sel.rangeCount) return ed.querySelector('table');
  let n=sel.anchorNode; while(n && n!==ed){ if(n.nodeName==='TABLE') return n; n=n.parentNode; }
  return ed.querySelector('table');
}
function tableAddRow(ed){
  const t=currentTable(ed); if(!t){ toast('Primer insereix una taula'); return; }
  const body=t.tBodies[0]||t; const cols=t.rows[0]?t.rows[0].cells.length:1;
  const tr=document.createElement('tr'); for(let i=0;i<cols;i++){ const td=document.createElement('td'); td.innerHTML='&nbsp;'; tr.appendChild(td); }
  body.appendChild(tr);
}
function tableAddCol(ed){
  const t=currentTable(ed); if(!t){ toast('Primer insereix una taula'); return; }
  Array.from(t.rows).forEach(row=>{ const isHead=row.parentNode && row.parentNode.nodeName==='THEAD';
    const cell=document.createElement(isHead?'th':'td'); cell.innerHTML=isHead?'Títol':'&nbsp;'; row.appendChild(cell); });
}
function tableDelRow(ed){
  const t=currentTable(ed); if(!t){ return; }
  const body=t.tBodies[0]; if(body && body.rows.length>0) body.deleteRow(body.rows.length-1); else t.remove();
}
function tableDelCol(ed){
  const t=currentTable(ed); if(!t){ return; }
  const cols=t.rows[0]?t.rows[0].cells.length:0;
  if(cols<=1){ t.remove(); return; }
  Array.from(t.rows).forEach(row=>{ if(row.cells.length) row.deleteCell(row.cells.length-1); });
}

/* burst dashes generator */
function makeBurst(container,count,radiusMin,radiusMax,cx,cy){
  container.innerHTML='';
  for(let i=0;i<count;i++){
    const ang=(Math.PI*2*i/count)+Math.random()*.4;
    const len=8+Math.random()*14;
    const r=radiusMin+Math.random()*(radiusMax-radiusMin);
    const s=el('span');
    s.style.height=len+'px';
    s.style.left=cx+'%'; s.style.top=cy+'%';
    s.style.transform=`translate(-50%,-50%) rotate(${ang}rad) translateY(-${r}px)`;
    s.style.opacity=(.35+Math.random()*.5).toFixed(2);
    container.appendChild(s);
  }
}

  if(sec.type==='links'){ const n=STATE.entries.filter(e=>e.section===sec.id).length; return n? `${n} enllaç${n===1?'':'os'}` : 'Cap enllaç'; }

  if(sec.type==='avaluacio'){ return 'Frases per trimestre'; }
  const n=STATE.entries.filter(e=>e.section===sec.id).length;
  return n? `${n} entrad${n===1?'a':'es'}` : 'Encara buit';

function shade(hex,pct){
  const n=parseInt(hex.slice(1),16); let r=(n>>16),g=(n>>8&255),b=(n&255);
  r=Math.max(0,Math.min(255,r+pct*2.55|0));g=Math.max(0,Math.min(255,g+pct*2.55|0));b=Math.max(0,Math.min(255,b+pct*2.55|0));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function renderSubthemes(S,sec){
  const c=el('div','composer');
  c.innerHTML=`<div class="add-sub">

    </div>`;
  S.appendChild(collapsibleComposer(c,'Nou subtema'));
  const addFn=async()=>{
    const name=$('#subName').value.trim(); if(!name){ toast('Posa un nom al subtema'); return; }
    const base=sec.id+'-'+slug(name);
    let id=base, n=2; while(STATE.subthemes.some(s=>s.id===id)){ id=base+'-'+n++; }
    await api.addSubtheme({id,section:sec.id,name,createdBy:ME,createdAt:nowISO(),order:STATE.subthemes.length});
    openSection(sec.id); toast('Subtema afegit');
  };
  $('#subAdd').onclick=addFn;
  $('#subName').addEventListener('keydown',e=>{ if(e.key==='Enter') addFn(); });

  const subs=STATE.subthemes.filter(s=>s.section===sec.id);
  if(!subs.length){ const em=el('div','empty-feed'); em.innerHTML=`<div class="big">🗂️</div>Encara no hi ha cap subtema. Afegeix-ne un!`; S.appendChild(em); return; }
  const grid=el('div','subtheme-grid');
  subs.forEach(sub=>grid.appendChild(subthemeCard(sub,sec)));
  S.appendChild(grid);
}
function subthemeCard(sub,sec){
  const entries=STATE.entries.filter(e=>e.subtheme===sub.id);
  const unread=entries.filter(e=>!(e.readBy||[]).includes(ME)).length;
  const card=el('div','subtheme-card');
  const name=el('div','st-name'); name.textContent=sub.name; card.appendChild(name);
  const meta=el('div','st-meta'); meta.textContent = entries.length? `${entries.length} entrad${entries.length===1?'a':'es'}` : 'Buit'; card.appendChild(meta);
  if(unread>0){ const bg=el('span','st-badge'); bg.textContent=unread; card.appendChild(bg); }
  const del=el('button','del'); del.title='Esborra el subtema';
  del.innerHTML=`<svg class="icon" viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>`;
  del.onclick=(ev)=>{ ev.stopPropagation();
    const msg = entries.length? `S\u2019esborrarà el subtema \u201C${sub.name}\u201D i les ${entries.length} entrades que conté.` : `S\u2019esborrarà el subtema \u201C${sub.name}\u201D.`;
    askConfirm(msg, async()=>{ await api.deleteSubtheme(sub.id); openSection(sec.id); toast('Subtema esborrat'); });

}

function renderMonthGrid(S,sec){
  if(!CAL_MONTH){ const n=new Date(); CAL_MONTH=new Date(n.getFullYear(),n.getMonth(),1); }
  const y=CAL_MONTH.getFullYear(), m=CAL_MONTH.getMonth();
  const head=el('div','cal-monthhead');
  const prev=el('button','cal-nav'); prev.innerHTML='‹'; prev.title='Mes anterior'; prev.onclick=()=>{ CAL_MONTH=new Date(y,m-1,1); openSection('calendari'); };
  const next=el('button','cal-nav'); next.innerHTML='›'; next.title='Mes següent'; next.onclick=()=>{ CAL_MONTH=new Date(y,m+1,1); openSection('calendari'); };
  const title=el('div','cal-monthtitle'); const mt=CAL_MONTH.toLocaleDateString('ca-ES',{month:'long',year:'numeric'}); title.textContent=mt.charAt(0).toUpperCase()+mt.slice(1);
  const todayb=el('button','cal-today'); todayb.textContent='Avui'; todayb.onclick=()=>{ const n=new Date(); CAL_MONTH=new Date(n.getFullYear(),n.getMonth(),1); openSection('calendari'); };
  head.appendChild(prev); head.appendChild(title); head.appendChild(next); head.appendChild(todayb);
  S.appendChild(head);
  const grid=el('div','cal-grid');
  ['Dl','Dt','Dc','Dj','Dv','Ds','Dg'].forEach(d=>{ const w=el('div','cal-wd'); w.textContent=d; grid.appendChild(w); });
  const startDow=(new Date(y,m,1).getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  for(let i=0;i<startDow;i++) grid.appendChild(el('div','cal-cell blank'));
  const n=new Date(); const todayStr=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  const events=STATE.entries.filter(e=>e.section==='calendari'&&e.eventDate);
  for(let day=1;day<=dim;day++){
    const dstr=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cell=el('div','cal-cell'+(dstr===todayStr?' today':''));
    const num=el('div','cal-num'); num.textContent=day; cell.appendChild(num);
    const evs=events.filter(e=>e.eventDate===dstr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    evs.slice(0,3).forEach(ev=>{
      const chip=el('button','cal-chip'); chip.style.background=groupById(ev.group).color;
      chip.textContent=(ev.time?ev.time+' ':'')+ev.title;
      chip.title=ev.title+' · '+groupById(ev.group).name+(ev.time?' · '+fmtTimeRange(ev):'');
      chip.onclick=(e2)=>{ e2.stopPropagation(); CAL_VIEW='llista'; openAndFlash(ev.id); };
      cell.appendChild(chip);
    });
    if(evs.length>3){ const more=el('div','cal-more'); more.textContent=`+${evs.length-3} més`; cell.appendChild(more); }
    cell.onclick=(e2)=>{ if(e2.target.closest('.cal-chip'))return;
      const di=$('#aDate'); if(di) di.value=dstr;
      const comp=document.querySelector('.composer.composer-collapsed'); const trig=document.querySelector('.composer-trigger');
      if(comp && !comp.classList.contains('open') && trig) trig.click();
      window.scrollTo({top:0,behavior:'smooth'});
      const ti=$('#aTitle'); if(ti) setTimeout(()=>ti.focus(),90);
    };
    grid.appendChild(cell);
  }
  S.appendChild(grid);
}

      <div class="field"><label>Nova tasca</label><input class="input" id="tTitle" placeholder="Què s\u2019ha de fer?"></div>
      <div class="field"><label>Descripció (opcional)</label><textarea class="input" id="tDesc" placeholder="Detalls…" style="min-height:56px"></textarea></div>
      <div class="row2">
        <div class="field"><label>Encarregat/da</label>
          <select class="input" id="tOwner">
            <option value="general">General (tots)</option>
            <option value="mireia">Mireia</option>
            <option value="cristina">Cristina</option>
            <option value="pol">Pol</option>
          </select></div>
        <div class="field"><label>Enllaç (opcional)</label><input class="input" id="tUrl" placeholder="https://…"></div>
        <button class="btn btn-primary" id="tSave"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Crea tasca</button>
      </div>
    </div>`;
  S.appendChild(collapsibleComposer(c,'Nova tasca'));
  $('#tOwner').value=ME;
  $('#tSave').onclick=async()=>{
    const title=$('#tTitle').value.trim(); if(!title){ toast('Posa un títol a la tasca'); return; }
    const ts=nowISO();
    const t={id:uid(),title,desc:$('#tDesc').value.trim(),owner:$('#tOwner').value,status:'pendent',url:$('#tUrl').value.trim(),author:ME,date:ts,createdAt:ts,updatedAt:ts,readBy:[ME]};
    await api.addTask(t); openSection('tasques'); toast('Tasca creada');
  };
  renderAgendarPanel(S);
  // controls
  const bar=el('div','kan-controls');
  const gbtn=el('button','kan-toggle'+(KANBAN_GROUP?' on':''));
  gbtn.innerHTML=`<svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><circle cx="17" cy="8" r="2.5"/><path d="M15.5 14.2A5 5 0 0 1 21 20"/></svg>Agrupa per encarregat`;
  gbtn.onclick=()=>{ KANBAN_GROUP=!KANBAN_GROUP; openSection('tasques'); };
  bar.appendChild(gbtn);
  S.appendChild(bar);
  // board
  const board=el('div','kanban');
  const groupOrder=['mireia','cristina','pol','general'];
  STATUSES.forEach(st=>{
    const col=el('div','col'); col.dataset.status=st.id;
    const list=STATE.tasks.filter(t=>t.status===st.id);
    const head=el('div','col-head');
    head.innerHTML=`<span class="dot" style="background:${st.color}"></span>${st.name}<span class="n">${list.length}</span>`;
    col.appendChild(head);
    if(!list.length){ const e=el('div','col-empty'); e.textContent='—'; col.appendChild(e); }
    else if(KANBAN_GROUP){
      groupOrder.forEach(oid=>{
        const grp=list.filter(t=>t.owner===oid);
        if(!grp.length) return;
        const gh=el('div','kan-group-head');
        gh.innerHTML=`<span class="dot" style="background:${oid==='general'?'var(--muted)':userById(oid).accent}"></span>${oid==='general'?'General':userById(oid).name}<span class="n">${grp.length}</span>`;
        col.appendChild(gh);
        grp.forEach(t=>col.appendChild(t.id===EDITING ? taskEditForm(t) : taskCard(t)));
      });
    } else {
      list.forEach(t=>col.appendChild(t.id===EDITING ? taskEditForm(t) : taskCard(t)));
    }
    // drag&drop
    col.addEventListener('dragover',ev=>{ev.preventDefault();col.classList.add('drop');});
    col.addEventListener('dragleave',()=>col.classList.remove('drop'));
    col.addEventListener('drop',async ev=>{
      ev.preventDefault(); col.classList.remove('drop');
      const id=ev.dataTransfer.getData('text'); const t=STATE.tasks.find(x=>x.id===id);
      if(t && t.status!==st.id){ t.status=st.id; await api.updateTask(t); openSection('tasques'); }
    });
    board.appendChild(col);
  });
  S.appendChild(board);
}
function taskCard(t){
  const card=el('div','task'); card.draggable=true; card.dataset.id=t.id;
  card.addEventListener('dragstart',ev=>{ev.dataTransfer.setData('text',t.id);card.classList.add('dragging');});
  card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  const top=el('div','toprow');
  const h=el('h5'); h.textContent=t.title; top.appendChild(h);
  const tools=el('div','task-tools');
  const edit=el('button','edit-btn'); edit.title='Edita';
  edit.innerHTML=`<svg class="icon" viewBox="0 0 24 24" style="width:1em;height:1em"><path d="M4 20h4L20 8l-4-4L4 16z"/><path d="M14 6l4 4"/></svg>`;
  edit.onclick=()=>{ EDITING=t.id; openSection('tasques'); };
  tools.appendChild(edit);
  const del=el('button','del'); del.innerHTML=`<svg class="icon" viewBox="0 0 24 24" style="width:1em;height:1em"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>`;
  del.onclick=()=>{ askConfirm('Vols esborrar aquesta tasca?', async()=>{ await api.deleteTask(t.id); openSection('tasques'); toast('Tasca esborrada'); }); };
  tools.appendChild(del);
  top.appendChild(tools);
  card.appendChild(top);
  if(t.desc){ const d=el('div','desc'); d.textContent=t.desc; card.appendChild(d); }
  const meta=el('div','meta');
  meta.appendChild(personChip(t.owner));
  if(t.origin){ const og=el('button','origin');
    og.innerHTML=`<svg class="icon" viewBox="0 0 24 24" style="width:1em;height:1em;stroke-width:2.4"><path d="M12 21s7-5.5 7-11a7 7 0 0 0-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>${esc(originLabelFromTask(t))}`;
    og.title='Ve de: '+originLabelFromTask(t); og.onclick=()=>openOrigin(t.origin); meta.appendChild(og); }
  if(t.updatedAt&&t.createdAt&&t.updatedAt!==t.createdAt){ const ed=el('span','edited-tag'); ed.textContent='editada'; meta.appendChild(ed); }
  if(t.url){ const a=el('a','link'); a.href=t.url; a.target='_blank'; a.rel='noopener';
    a.innerHTML=`<svg class="icon" viewBox="0 0 24 24" style="width:1em;height:1em"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg>Enllaç`; meta.appendChild(a); }
  card.appendChild(meta);
  const move=el('div','move');
  STATUSES.forEach(st=>{
    const btn=el('button'); btn.textContent=st.name;
    if(t.status===st.id){ btn.classList.add('on'); btn.style.background=st.color; }
    btn.onclick=async()=>{ if(t.status!==st.id){ t.status=st.id; await api.updateTask(t); openSection('tasques'); } };
    move.appendChild(btn);
  });
  card.appendChild(move);
  return card;
}
function taskEditForm(t){
  const card=el('div','task editing'); card.dataset.id=t.id;
  const mk=(labelTxt,node)=>{const f=el('div','field');const l=el('label');l.textContent=labelTxt;f.appendChild(l);f.appendChild(node);return f;};
  const ti=el('input','input'); ti.value=t.title||'';
  const de=el('textarea','input'); de.value=t.desc||''; de.style.minHeight='58px';
  const ow=el('select','input');
  [['general','General (tots)'],['mireia','Mireia'],['cristina','Cristina'],['pol','Pol']].forEach(o=>{
    const op=el('option'); op.value=o[0]; op.textContent=o[1]; if(t.owner===o[0])op.selected=true; ow.appendChild(op);
  });
  const ur=el('input','input'); ur.value=t.url||''; ur.placeholder='https://…';
  card.appendChild(mk('Tasca',ti));
  card.appendChild(mk('Descripció (opcional)',de));
  card.appendChild(mk('Encarregat/da',ow));
  card.appendChild(mk('Enllaç (opcional)',ur));
  const row=el('div','edit-actions');
  const cancel=el('button','btn btn-ghost'); cancel.textContent='Cancel·la';
  const save=el('button','btn btn-primary'); save.innerHTML=`<svg class="icon" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>Desa`;
  cancel.onclick=()=>{ EDITING=null; openSection('tasques'); };
  save.onclick=async()=>{
    if(!ti.value.trim()){ toast('La tasca necessita un títol'); return; }
    t.title=ti.value.trim(); t.desc=de.value.trim(); t.owner=ow.value; t.url=ur.value.trim();
    t.updatedAt=nowISO(); t.editedBy=ME; t.readBy=[ME];
    EDITING=null; await api.updateTask(t); openSection('tasques'); toast('Modificació desada · torna a sortir a Novetats');
  };
  row.appendChild(cancel); row.appendChild(save); card.appendChild(row);
  return card;
}

$('#sheet').addEventListener('click',e=>{ if(e.target.dataset.close!==undefined) $('#sheet').classList.remove('open'); });
function buildQuick(){
  const g=$('#qgrid'); g.innerHTML='';
  // Inici
  const home=el('button','qbtn');
  home.innerHTML=`<span class="qi" style="background:linear-gradient(180deg,var(--teal),#0c4e63)"><svg class="icon" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span><span class="qn">Inici</span>`;
  home.onclick=()=>{ $('#sheet').classList.remove('open'); goHome(); };
  g.appendChild(home);
  SECTIONS.forEach(sec=>{
    const badge=sectionBadge(sec);
    const b=el('button','qbtn');
    b.innerHTML=`<span class="qi" style="background:${sec.color}"><svg class="icon" viewBox="0 0 24 24">${ICONS[sec.ico]}</svg></span>
      <span class="qn">${sec.name}</span>${badge>0?`<span class="qb">${badge}</span>`:''}`;

/* ============================================================
   CERCADOR GLOBAL
   ============================================================ */
const norm = s => (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
function searchAll(q){
  const tokens = norm(q).split(/\s+/).filter(Boolean);
  if(!tokens.length) return [];
  const match = text => { const t=norm(text); return tokens.every(tok=>t.includes(tok)); };
  const res=[];
  STATE.entries.forEach(e=>{ if(match((e.title||'')+' '+stripHtml(e.body||''))) res.push({type:'entry',item:e,section:e.section}); });
  STATE.tasks.forEach(t=>{ if(match((t.title||'')+' '+(t.desc||''))) res.push({type:'task',item:t,section:'tasques'}); });
  res.sort((a,b)=> new Date(b.item.date)-new Date(a.item.date));
  return res;
}
const searchOv=$('#search');
$('#searchBtn').onclick=openSearch;
$('#searchClose').onclick=closeSearch;
searchOv.addEventListener('click',e=>{ if(e.target.dataset.sclose!==undefined) closeSearch(); });
$('#searchInput').addEventListener('input',e=>renderSearch(e.target.value));
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && searchOv.classList.contains('open')) closeSearch(); });
function openSearch(){ searchOv.classList.add('open'); $('#searchInput').value=''; renderSearch(''); setTimeout(()=>$('#searchInput').focus(),60); }
function closeSearch(){ searchOv.classList.remove('open'); }
function renderSearch(q){
  const box=$('#searchResults'); box.innerHTML='';
  const query=q.trim();
  if(!query){ const h=el('div','search-empty'); h.textContent='Escriu una paraula clau per buscar-la a totes les àrees.'; box.appendChild(h); return; }
  const res=searchAll(query);
  if(!res.length){ const h=el('div','search-empty'); h.innerHTML=`Cap resultat per <b>\u201C${esc(query)}\u201D</b>.`; box.appendChild(h); return; }
  const head=el('div','search-empty'); head.style.padding='6px 4px'; head.style.background='transparent'; head.style.boxShadow='none';
  head.style.textAlign='left'; head.textContent=`${res.length} resultat${res.length===1?'':'s'}`; box.appendChild(head);
  res.forEach(r=>box.appendChild(searchRow(r)));
}
function searchRow(r){
  const sec=secById(r.section);
  const isTask=r.type==='task';
  const row=el('button','sres'); row.dataset.id=r.item.id;
  row.appendChild(avatarEl(r.item.author,32));
  const body=el('div','body');
  const top=el('div','top');
  const tag=el('span','chip'); tag.style.background=sec.color+'22'; tag.style.color=sec.color; tag.textContent=sec.name; top.appendChild(tag);
  if(isTask){ const st=STATUSES.find(s=>s.id===r.item.status); const stc=el('span','chip'); stc.style.background=st.color; stc.style.color='#fff'; stc.textContent=st.name; top.appendChild(stc); }
  body.appendChild(top);
  const h=el('h5'); h.textContent=r.item.title || sec.name; body.appendChild(h);
  const snippet = isTask ? (r.item.desc||'') : stripHtml(r.item.body||'');
  if(snippet){ const p=el('p'); p.textContent=snippet; body.appendChild(p); }
  row.appendChild(body);
  row.onclick=()=>openAndFlash(r.item.id);
  return row;
}
function openAndFlash(itemId){
  closeSearch();
  const entry=STATE.entries.find(e=>e.id===itemId);
  const task=STATE.tasks.find(t=>t.id===itemId);
  if(entry){ if(entry.section==='calendari') CAL_VIEW = entry.eventDate ? 'llista' : 'agendar';
    if(entry.subtheme) openSubtheme(entry.section, entry.subtheme); else openSection(entry.section); }
  else if(task){ openSection('tasques'); }
  else return;
  setTimeout(()=>{
    const node=document.querySelector(`#section [data-id="${itemId}"]`);
    if(node){ node.scrollIntoView({behavior:'smooth',block:'center'}); node.classList.add('flash');
      setTimeout(()=>node.classList.remove('flash'),1700); }
  },440);
}

  buildLogin();
  await api.init();
  startCloudSync();
  let saved=null; try{ saved=localStorage.getItem('coord_me'); }catch(e){}
  if(saved && USERS.some(u=>u.id===saved)){ login(saved); }
})();
